name: Publish to npm

# Publishes @kahflane/whatsapp-mcp to the public npm registry when a
# GitHub Release is published, or on a manual dispatch.
# Requires an `NPM_TOKEN` repo secret (npm automation token with publish rights;
# an automation token also satisfies npm's 2FA requirement for publishing).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build bundle (dist/index.js)
        run: bun run build

      # Node runs `npm publish` against the public registry.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
